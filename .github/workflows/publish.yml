name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Cache built JARs
      uses: actions/cache@v5
      with:
        path: |
          jaydebeapiarrow/lib/
          test/jars/
          arrow-jdbc-extension/target/
          mockdriver/target/
        key: ${{ runner.os }}-jars-${{ hashFiles('**/pom.xml', 'test/build.sh') }}
        restore-keys: |
          ${{ runner.os }}-jars-
    - name: Build with Maven
      run: bash test/build.sh
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    - name: Set version for TestPyPI
      if: github.event_name == 'workflow_dispatch'
      run: |
        VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
        sed -i "s/version = \"$VERSION\"/version = \"$VERSION.dev${{ github.run_number }}\"/" pyproject.toml
    - name: Install build tools
      run: pip install build
    - name: Build wheel and tarball
      run: python3 -m build
    - name: Store artifact
      uses: actions/upload-artifact@v7
      with:
        name: python-package-distributions
        path: dist/

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/JayDeBeApiArrow

    permissions:
      id-token: write

    steps:
    - name: Download dists
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    name: Verify TestPyPI package
    needs: publish-to-testpypi
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    - name: Cache built JARs
      uses: actions/cache@v5
      with:
        path: |
          jaydebeapiarrow/lib/
          test/jars/
          arrow-jdbc-extension/target/
          mockdriver/target/
        key: ${{ runner.os }}-jars-${{ hashFiles('**/pom.xml', 'test/build.sh') }}
        restore-keys: |
          ${{ runner.os }}-jars-
    - name: Build with Maven
      run: bash test/build.sh
    - name: Install from TestPyPI
      run: pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ JayDeBeApiArrow
    - name: Run mock tests
      run: CLASSPATH="test/jars/*" python test/testsuite.py test_mock

  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/JayDeBeApiArrow

    permissions:
      id-token: write

    steps:
    - name: Download dists
      uses: actions/download-artifact@v8
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
