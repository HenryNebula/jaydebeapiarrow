# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: tests

on:
  push:
  pull_request:
    branches: [ master ]

jobs:
  test:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        python-version: [3.9, 3.14]
        plattform: ["Python"]

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: test_db
          POSTGRES_PASSWORD: password
          POSTGRES_USER: user
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test_db
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Maven cache
      uses: actions/cache@v5
      with:
        path: .tox/shared/.m2
        key: ${{ matrix.plattform }}-${{ matrix.python-version }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ matrix.plattform }}-${{ matrix.python-version }}-maven-
    - name: JDBC driver cache
      uses: actions/cache@v5
      with:
        path: test/jars/
        key: ${{ runner.os }}-jdbc-drivers-${{ hashFiles('test/download_jdbc_drivers.sh') }}
    - name: Pip cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ matrix.plattform }}-${{ matrix.python-version }}-pip-${{ hashFiles('**/*requirements.txt', 'tox.ini', 'setup.py') }}
        restore-keys: |
          ${{ matrix.plattform }}-${{ matrix.python-version }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install coveralls tox tox-gh-actions
    - name: Test with tox for non Jython only
      run: tox
      env:
        JY_PG_HOST: localhost
        JY_PG_PORT: "5432"
        JY_PG_DB: test_db
        JY_PG_USER: user
        JY_PG_PASSWORD: password
        JY_MYSQL_HOST: localhost
        JY_MYSQL_PORT: "3306"
        JY_MYSQL_DB: test_db
        JY_MYSQL_USER: user
        JY_MYSQL_PASSWORD: password
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: always() # always run even if tests fail
      with:
        check_name: "JUnit Test Report (Python ${{ matrix.python-version }})"
        job_summary: true
        report_paths: '**/build/test-reports/*.xml'
        report_title: "JUnit Test Report (Python ${{ matrix.python-version }})"
        detailed_summary: true
        include_passed: true
#    - name: Coveralls
#      uses: baztian/coveralls-python-action@new-merged-changes
#      with:
#        parallel: true
#        flag-name: ${{ matrix.plattform }}-${{ matrix.python-version }}
#        coverage-version: 4.5.4
